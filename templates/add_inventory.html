{% extends "base.html" %}

{% block title %}Create Bin{% endblock %}

{% block content %}
<section class="content-panel form-panel">
    <div class="page-header">
        <h2>Create Bin</h2>
    </div>

    <form method="post" class="stack-form">
        <div class="form-row">
            <label>Generated Bin Number</label>
            <input type="text" name="bin_number" value="{{ next_bin_number }}" readonly>
        </div>

        <div class="form-row">
            <label>Category</label>
            <select name="category_id" required>
                <option value="">Select</option>
                {% for c in categories %}
                    <option value="{{ c.category_id }}">{{ c.category_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <label>Storage Purpose</label>
            <select name="storage_purpose_id" required>
                <option value="">Select</option>
                {% for p in storage_purposes %}
                    <option value="{{ p.storage_purpose_id }}">{{ p.purpose_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <label>Location</label>
            <select name="current_location_id" id="locationSelect" required>
                <option value="">Select</option>
                {% for l in locations %}
                    <option value="{{ l.location_id }}" data-location-name="{{ l.location_name }}">{{ l.location_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row" id="zoneRow" style="display:none;">
            <label>Warehouse zone</label>
            <select name="warehouse_zone" id="zoneSelect">
                <option value="">Select</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>
        </div>

        <div class="form-row">
            <label>Event (optional)</label>
            <select name="event_id">
                <option value="">None</option>
                {% for e in events %}
                    <option value="{{ e.event_id }}">{{ e.event_name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit">Create Bin</button>
    </form>
</section>

<script>
    const locationSelect = document.getElementById("locationSelect");
    const zoneRow = document.getElementById("zoneRow");
    const zoneSelect = document.getElementById("zoneSelect");

    function togglezone() {
        const selected = locationSelect.options[locationSelect.selectedIndex];
        const locationName = selected ? selected.dataset.locationName : "";

        if (locationName === "Warehouse") {
            zoneRow.style.display = "flex";
            zoneSelect.required = true;
        } else {
            zoneRow.style.display = "none";
            zoneSelect.required = false;
            zoneSelect.value = "";
        }
    }

    locationSelect.addEventListener("change", togglezone);
    togglezone();
</script>
{% endblock %}
