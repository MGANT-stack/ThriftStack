{% extends "base.html" %}

{% block title %}Move Bin{% endblock %}

{% block content %}
<section class="content-panel form-panel">
    <h2>Move Bin</h2>

    <form method="post" class="stack-form">
        <div class="form-row">
            <label>Bin</label>
            <select name="inventory_lot_id" required>
                <option value="">Select</option>
                {% for lot in inventory_lots %}
                    <option value="{{ lot.inventory_lot_id }}">
                        {{ lot.bin_number }} - {{ lot.category_name }} ({{ lot.location_name }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <label>To Location</label>
            <select name="to_location_id" id="moveLocationSelect" required>
                <option value="">Select</option>
                {% for l in locations %}
                    <option value="{{ l.location_id }}" data-location-name="{{ l.location_name }}">{{ l.location_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row" id="moveZoneRow" style="display:none;">
            <label>Warehouse Zone</label>
            <select name="warehouse_Zone" id="moveZoneSelect">
                <option value="">Select</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>
        </div>

        <button type="submit">Move Bin</button>
    </form>
</section>

<script>
    const moveLocationSelect = document.getElementById("moveLocationSelect");
    const moveZoneRow = document.getElementById("moveZoneRow");
    const moveZoneSelect = document.getElementById("moveZoneSelect");

    function toggleMoveZone() {
        const selected = moveLocationSelect.options[moveLocationSelect.selectedIndex];
        const locationName = selected ? selected.dataset.locationName : "";

        if (locationName === "Warehouse") {
            moveZoneRow.style.display = "flex";
            moveZoneSelect.required = true;
        } else {
            moveZoneRow.style.display = "none";
            moveZoneSelect.required = false;
            moveZoneSelect.value = "";
        }
    }

    moveLocationSelect.addEventListener("change", toggleMoveZone);
    toggleMoveZone();
</script>
{% endblock %}
